<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lecturas Interactivas</title>
    <meta name="description"
        content="Plataforma inmersiva de narrativa adaptativa. Lee clásicos de la literatura con decisiones interactivas, efectos visuales, y asistente de IA.">

    <!-- Open Graph (WhatsApp, Facebook, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Lecturas Interactivas — Leer nunca fue tan inmersivo">
    <meta property="og:description"
        content="Lee clásicos de la literatura con decisiones interactivas, efectos visuales, audio inmersivo y un asistente de IA.">
    <meta property="og:site_name" content="Lecturas Interactivas">
    <meta property="og:image" content="https://app-libro-interactivo.vercel.app/images/og-share.png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:url" content="https://app-libro-interactivo.vercel.app/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lecturas Interactivas">
    <meta name="twitter:description"
        content="Plataforma inmersiva de narrativa adaptativa con IA, efectos visuales y audio.">
    <meta name="twitter:image" content="https://app-libro-interactivo.vercel.app/images/og-share.png">

    <!-- Íconos y PWA para iOS/Android -->
    <link rel="icon" type="image/png" sizes="512x512" href="/images/app-icon-512.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/images/app-icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lecturas Interactivas">

    <!-- Fuentes Premium (no-bloqueantes) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700;900&family=Cormorant+Garamond:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700;900&family=Cormorant+Garamond:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700;900&family=Cormorant+Garamond:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap">
    </noscript>

    <style id="critical-css">
        @layer reset, tokens, layout, components, library, reader, auth, poems, effects, utilities;

        @layer reset {
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
        }

        :root {
            --color-bg-primary: oklch(15% 0.02 240);
            --color-bg-secondary: oklch(20% 0.03 240);
            --color-bg-elevated: oklch(22% 0.03 240);
            --color-accent-primary: oklch(70% 0.25 330);
            --color-accent-secondary: oklch(75% 0.2 200);
            --color-text-primary: oklch(95% 0.01 240);
            --color-text-secondary: oklch(70% 0.02 240);
            --color-text-tertiary: oklch(50% 0.02 240);
            --color-glass-bg: rgba(255, 255, 255, 0.05);
            --color-glass-border: rgba(255, 255, 255, 0.1);
            --color-overlay-dark: rgba(0, 0, 0, 0.6);
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-12: 3rem;
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --leading-tight: 1.2;
            --leading-normal: 1.5;
            --leading-relaxed: 1.6;
            --font-light: 300;
            --font-normal: 400;
            --font-semibold: 600;
            --font-bold: 700;
            --font-black: 900;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --radius-sm: 0.25rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            --duration-fast: 150ms;
            --duration-normal: 300ms;
            --ease-out: cubic-bezier(0, 0, 0.2, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --z-sticky: 200;
            --backdrop-blur: blur(20px) saturate(180%);
        }

        html, body { width: 100%; min-height: 100%; }
        body {
            margin: 0;
            font-family: var(--font-body);
            font-size: var(--text-base);
            line-height: var(--leading-normal);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            overflow-x: hidden;
        }

        [hidden], .hidden { display: none !important; }

        #app-container {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        #main-content {
            flex: 1; display: flex; flex-direction: column;
            opacity: 0;
            transition: opacity 0.25s ease-out;
        }
        #main-content.ready { opacity: 1; }

        /* ── Splash Screen ── */
        .app-splash {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 0.75rem;
            background: var(--color-bg-primary);
            z-index: 99999;
            transition: opacity 0.35s ease-out;
        }
        .app-splash.fade-out {
            opacity: 0; pointer-events: none;
        }
        .splash-icon {
            font-size: 2.5rem;
            animation: splash-pulse 1.8s ease-in-out infinite;
        }
        .splash-text {
            font-family: var(--font-display);
            font-size: clamp(var(--text-lg), 4vw, var(--text-xl));
            font-weight: var(--font-bold);
            background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.01em;
        }
        @keyframes splash-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.12); opacity: 1; }
        }

        #app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: max(var(--space-4), env(safe-area-inset-top)) max(var(--space-6), env(safe-area-inset-right)) var(--space-4) max(var(--space-6), env(safe-area-inset-left));
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
            border-bottom: 1px solid var(--color-glass-border);
            background: var(--color-glass-bg);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
        }
        .header-left { display: flex; align-items: center; gap: var(--space-3); }
        #main-title {
            font-family: var(--font-display);
            font-weight: var(--font-black);
            font-size: clamp(var(--text-xl), 4vw, var(--text-2xl));
            line-height: var(--leading-tight);
            background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #settings-controls {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem;
            border: 1px solid rgba(255, 255, 255, 0.055);
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.028);
        }
        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.035));
            color: rgba(232, 238, 247, 0.78);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        #auth-view {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6) var(--space-4);
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-5);
            border-radius: var(--radius-2xl);
            background: rgba(20, 20, 35, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .auth-card-header { text-align: center; margin-bottom: var(--space-4); }
        .auth-title {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            margin-bottom: var(--space-1);
        }
        .auth-subtitle { font-size: var(--text-sm); color: var(--color-text-secondary); }
        .auth-form { display: flex; flex-direction: column; gap: var(--space-3); }
        .auth-field { position: relative; }
        .auth-input {
            width: 100%;
            min-height: 44px;
            padding: var(--space-3) var(--space-3) var(--space-1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.04);
            color: var(--color-text-primary);
            font: inherit;
        }
        .auth-label {
            position: absolute;
            left: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--color-text-tertiary);
            font-size: var(--text-base);
        }
        .auth-extras {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
        }
        .auth-submit-btn, .auth-skip-btn-inner {
            width: 100%;
            min-height: 44px;
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: var(--font-body);
            font-size: var(--text-base);
            font-weight: var(--font-semibold);
        }
        .auth-submit-btn {
            color: #fff;
            background: linear-gradient(135deg, var(--color-accent-primary), oklch(65% 0.22 280));
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.3);
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin: var(--space-4) 0;
            color: var(--color-text-tertiary);
            font-size: var(--text-xs);
            text-transform: uppercase;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }
        .auth-skip-btn-inner {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.06);
        }
        .auth-footer-text {
            margin-top: var(--space-4);
            text-align: center;
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
        }

        #library-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-12);
            padding: max(1.5rem, env(safe-area-inset-top)) max(1.25rem, env(safe-area-inset-right)) max(3rem, env(safe-area-inset-bottom)) max(1.25rem, env(safe-area-inset-left));
            background: linear-gradient(180deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
        }
        .library-hero, .library-sections { width: 100%; max-width: 1200px; margin: 0 auto; }
    </style>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#1a1a1a">
</head>

<body class="theme-dark">
    <!-- Splash: visible until JS is ready -->
    <div id="app-splash" class="app-splash" aria-hidden="true">
        <div class="splash-text">Lecturas Interactivas</div>
    </div>
    <div id="app-container">
        <!-- BARRA SUPERIOR -->
        <header id="app-header">
            <div class="header-left">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <h1 id="main-title">Lecturas Interactivas</h1>
                    <span id="app-version"
                        style="font-size: 0.8rem; opacity: 0.6; font-weight: normal; letter-spacing: 1px; color: var(--color-text-secondary, #aaa);"
                        title="Version indicator">v2</span>
                </div>
                <button id="back-to-library" class="icon-btn hidden" aria-label="Volver a la biblioteca">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                    </svg>
                </button>
            </div>

            <div id="settings-controls">
                <!-- User Avatar (injected by auth module) -->
                <div id="header-avatar-slot"></div>
                <!-- Pantalla Completa (Reader only) -->
                <button id="fullscreen-btn" class="icon-btn hidden" aria-label="Pantalla completa">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
                <!-- Índice / historial -->
                <button id="nav-toggle" class="icon-btn hidden" aria-label="Índice de lectura">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z" />
                    </svg>
                </button>

            </div>
        </header>

        <main id="main-content">
            <!-- VISTA AUTENTICACIÓN -->
            <section id="auth-view" aria-label="Autenticación" hidden></section>

            <!-- VISTA BIBLIOTECA -->
            <section id="library-view" aria-label="Biblioteca de libros interactivos" hidden>
                <section id="library-hero" class="library-hero" aria-label="Libro destacado"></section>
                <div id="library-sections" class="library-sections">
                    <!-- Las secciones se rellenan con JS -->
                </div>
            </section>

            <!-- VISTA LECTOR -->
            <section id="reader-view" aria-label="Lector de historias" hidden>
                <div id="book-container">
                    <div id="book">
                        <div id="page-wrapper">
                            <div id="highlight-menu" class="highlight-menu" role="menu" aria-hidden="true">
                                <button type="button" class="highlight-menu-action"
                                    data-action="highlight">Resaltar</button>
                                <div class="highlight-menu-divider"></div>
                                <div class="highlight-menu-colors" role="group" aria-label="Elegir color">
                                    <button type="button" class="highlight-color-btn highlight-yellow"
                                        data-color-id="sun" aria-label="Amarillo suave"></button>
                                    <button type="button" class="highlight-color-btn highlight-green"
                                        data-color-id="mint" aria-label="Menta"></button>
                                    <button type="button" class="highlight-color-btn highlight-blue" data-color-id="sky"
                                        aria-label="Celeste"></button>
                                </div>
                            </div>
                            <div id="highlight-edit-menu" class="highlight-menu highlight-menu--edit" role="menu"
                                aria-hidden="true">
                                <span class="highlight-menu-title">Resaltado</span>
                                <div class="highlight-menu-colors" role="group" aria-label="Cambiar color">
                                    <button type="button" class="highlight-color-btn highlight-yellow"
                                        data-color-id="sun" aria-label="Amarillo suave"></button>
                                    <button type="button" class="highlight-color-btn highlight-green"
                                        data-color-id="mint" aria-label="Menta"></button>
                                    <button type="button" class="highlight-color-btn highlight-blue" data-color-id="sky"
                                        aria-label="Celeste"></button>
                                </div>
                                <button type="button" class="highlight-menu-action danger" data-action="delete">Eliminar
                                    resaltado</button>
                            </div>
                        </div>
                    </div>
                </div>

                <footer id="app-footer">
                    <div id="progress-bar-container">
                        <div id="progress-fill" style="width: 0%"></div>
                        <input type="range" id="progress-slider" min="1" max="1" step="1" value="1"
                            aria-label="Deslizar para avanzar páginas">
                    </div>
                    <div class="progress-footer-row">
                        <button id="highlight-panel-toggle" class="highlight-panel-toggle" type="button"
                            aria-label="Abrir panel de citas">
                            <span class="highlight-panel-icon" aria-hidden="true">⋯</span>
                        </button>
                        <div id="progress-page-label" aria-live="polite">Página 1 / 1</div>
                        <div id="progress-percentage" class="progress-percentage"></div>
                    </div>
                </footer>
                <aside id="highlight-panel" class="highlight-panel" aria-label="Panel de citas" aria-hidden="true">
                    <div class="highlight-panel-header">
                        <h3>Citas guardadas</h3>
                        <button type="button" class="highlight-panel-close" data-action="close"
                            aria-label="Cerrar panel">✕</button>
                    </div>
                    <div class="highlight-panel-body">
                        <div id="highlight-list" class="highlight-panel-list"></div>
                    </div>
                </aside>
            </section>
        </main>

        <!-- MODAL DE NAVEGACIÓN / HISTORIAL -->
        <div id="nav-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Tu viaje</h2>
                    <button id="nav-close">✕</button>
                </div>
                <div class="modal-body">
                    <button id="restart-btn" class="btn btn-danger" style="width: 100%;">⟲ Reiniciar historia</button>
                    <div class="history-list-container">
                        <h3>Pasos recientes</h3>
                        <ul id="history-list"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL DE CONFIRMACIÓN: ETERNO RETORNO -->
        <div id="restart-confirm-modal" class="modal-overlay" style="z-index: 10005;">
            <div class="modal-content" style="max-width: 320px; text-align: center;">
                <div class="modal-body" style="padding: var(--space-6) var(--space-4);">
                    <h3 style="margin-top: 0; font-family: var(--font-display);">¿Reiniciar historia?</h3>
                    <p style="color: var(--color-text-secondary); margin-bottom: var(--space-6);">Perderás el progreso actual de esta lectura.</p>
                    <div style="display: flex; gap: var(--space-3); justify-content: center;">
                        <button id="restart-cancel-btn" class="btn btn-ghost">Cancelar</button>
                        <button id="restart-confirm-btn" class="btn btn-danger">Reiniciar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
